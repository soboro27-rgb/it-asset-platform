<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>로그인 - IT자산 매각 플랫폼</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body {
      background: linear-gradient(135deg, #0f2752 0%, #1a3a7a 40%, #1d4ed8 80%, #3b82f6 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(96,165,250,.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(29,78,216,.18) 0%, transparent 50%);
      z-index: 0;
      pointer-events: none;
    }

    .login-wrap { width: 100%; max-width: 440px; padding: 16px; position: relative; z-index: 1; }

    .brand-header { text-align: center; margin-bottom: 20px; }
    .wm-logo-wrap { display: inline-block; margin-bottom: 14px; filter: drop-shadow(0 4px 12px rgba(0,0,0,.3)); }
    .brand-header h1 {
      font-size: 20px; font-weight: 700; color: #fff;
      margin: 0 0 4px; text-shadow: 0 1px 4px rgba(0,0,0,.2);
    }

    .login-card {
      background: rgba(255,255,255,.97);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(15,39,82,.35), 0 1px 6px rgba(0,0,0,.08);
      border: 1px solid rgba(147,197,253,.3);
      padding: 32px 36px;
    }

    .form-label { font-size: 13px; font-weight: 600; color: #1e3a8a; }
    .input-group-text { background: #EFF6FF; border-color: #BFDBFE; color: #1d4ed8; }
    .form-control {
      font-size: 14px; padding: 10px 14px;
      border-radius: 0 8px 8px 0 !important;
      border-color: #BFDBFE;
    }
    .form-control:focus { border-color: #1d4ed8; box-shadow: 0 0 0 3px rgba(29,78,216,.15); }
    .input-group .input-group-text { border-radius: 8px 0 0 8px !important; }

    .btn-login {
      background: linear-gradient(135deg, #1d4ed8, #3b82f6);
      color: #fff; border: none; border-radius: 10px;
      width: 100%; padding: 13px; font-size: 15px; font-weight: 700;
      letter-spacing: .3px; transition: all .2s;
      box-shadow: 0 4px 14px rgba(29,78,216,.4);
    }
    .btn-login:hover {
      background: linear-gradient(135deg, #1a3fc7, #1d4ed8);
      color: #fff; transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(29,78,216,.5);
    }
    .btn-login:active { transform: translateY(0); }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: #CBD5E1; font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #E2E8F0;
    }

    .footer-links { text-align: center; margin-top: 20px; }
    .footer-links a {
      color: #93C5FD; font-size: 12px; text-decoration: none;
      display: inline-flex; align-items: center; gap: 5px;
      border: 1px solid rgba(147,197,253,.4);
      padding: 7px 18px; border-radius: 20px;
      background: rgba(255,255,255,.08); transition: all .2s;
    }
    .footer-links a:hover { background: rgba(255,255,255,.15); color: #fff; }
    .footer-copy { text-align: center; margin-top: 14px; font-size: 11px; color: rgba(255,255,255,.35); }
    .footer-copy span { color: rgba(147,197,253,.7); font-weight: 600; }
  </style>
</head>
<body>
<div class="login-wrap">

  <!-- 브랜드 헤더 -->
  <div class="brand-header">
    <div class="wm-logo-wrap">
      <svg viewBox="0 0 100 60" width="90" height="54" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="wdL" x1="30" y1="0" x2="30" y2="60" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#93c5fd"/>
            <stop offset="50%" stop-color="#60a5fa"/>
            <stop offset="100%" stop-color="#dbeafe"/>
          </linearGradient>
          <linearGradient id="wdR" x1="80" y1="0" x2="80" y2="60" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#bfdbfe"/>
            <stop offset="50%" stop-color="#93c5fd"/>
            <stop offset="100%" stop-color="#eff6ff"/>
          </linearGradient>
        </defs>
        <path d="M2 3 L13 3 L22 38 L31 16 L40 38 L49 3 L60 3 L43 57 L31 27 L19 57 Z" fill="url(#wdL)"/>
        <path d="M63 3 L77 3 Q97 3 97 30 Q97 57 77 57 L63 57 L63 47 L75 47 Q84 47 84 30 Q84 13 75 13 L63 13 Z" fill="url(#wdR)"/>
      </svg>
    </div>
    <h1>IT자산 매각 플랫폼</h1>
  </div>

  <!-- 로그인 카드 -->
  <div class="login-card">
    {% if error %}
    <div class="alert d-flex align-items-center gap-2 py-2 px-3 mb-4"
         style="font-size:13px;border-radius:8px;background:#FFF5F5;border:1px solid #FFCDD2;color:#C62828">
      <i class="bi bi-exclamation-circle-fill"></i> {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login">
      <div class="mb-3">
        <label class="form-label">아이디</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person-badge-fill"></i></span>
          <input type="text" name="branch_code" class="form-control"
                 placeholder="아이디를 입력하세요" required autofocus/>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">비밀번호</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="password" class="form-control"
                 placeholder="비밀번호를 입력하세요" required/>
        </div>
      </div>
      <button type="submit" class="btn btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>로그인
      </button>
    </form>

    <div class="divider">접속 안내</div>
  </div>

  <!-- 하단 링크 -->
  <div class="footer-links">
    <a href="/process">
      <i class="bi bi-play-circle"></i> 플랫폼 업무 프로세스 소개
    </a>
  </div>
  <div class="footer-copy">
    Powered by <span>WorldWideMemory IT자산 매각 플랫폼</span>
  </div>
</div>
</body>
</html>
