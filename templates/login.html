<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>로그인 - MG IT자산 매각 플랫폼</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    :root { --mg: #006633; --mg-dark: #004D26; --mg-gold: #F5C800; }

    body {
      background: linear-gradient(135deg, #023E8A 0%, #0077B6 40%, #00B4D8 80%, #90E0EF 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    }

    /* 배경 물결 효과 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(144,224,239,.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(0,180,216,.2) 0%, transparent 50%);
      z-index: 0;
      pointer-events: none;
    }

    .login-wrap { width: 100%; max-width: 440px; padding: 16px; }

    /* 상단 브랜드 헤더 */
    .brand-header {
      text-align: center;
      margin-bottom: 20px;
    }
    .mg-logo {
      height: 60px;
      max-width: 180px;
      display: inline-block;
      margin-bottom: 14px;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,.25));
      object-fit: contain;
    }
    .brand-header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin: 0 0 4px;
      text-shadow: 0 1px 4px rgba(0,0,0,.2);
    }
    .brand-header p {
      font-size: 12px;
      color: rgba(255,255,255,.75);
      margin: 0;
    }

    /* 로그인 카드 */
    .login-card {
      background: rgba(255,255,255,.97);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,119,182,.25), 0 1px 6px rgba(0,0,0,.08);
      border: 1px solid rgba(144,224,239,.4);
      padding: 32px 36px;
      position: relative;
      z-index: 1;
    }

    .form-label { font-size: 13px; font-weight: 600; color: #023E8A; }
    .input-group-text {
      background: #EFF9FF;
      border-color: #90E0EF;
      color: #0077B6;
    }
    .form-control {
      font-size: 14px;
      padding: 10px 14px;
      border-radius: 0 8px 8px 0 !important;
      border-color: #90E0EF;
    }
    .form-control:focus {
      border-color: #0077B6;
      box-shadow: 0 0 0 3px rgba(0,119,182,.15);
    }
    .input-group .input-group-text { border-radius: 8px 0 0 8px !important; }

    .btn-login {
      background: linear-gradient(135deg, #0077B6, #00B4D8);
      color: #fff;
      border: none;
      border-radius: 10px;
      width: 100%;
      padding: 13px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .3px;
      transition: all .2s;
      box-shadow: 0 4px 14px rgba(0,119,182,.4);
    }
    .btn-login:hover {
      background: linear-gradient(135deg, #023E8A, #0077B6);
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(0,119,182,.5);
    }
    .btn-login:active { transform: translateY(0); }

    /* 역할 배지 */
    .role-badges { display: flex; gap: 8px; margin-top: 22px; justify-content: center; flex-wrap: wrap; }
    .role-badge {
      font-size: 11px;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid #C5E0D0;
      color: #4A7A5E;
      background: #F5FAF7;
    }

    /* 하단 링크 */
    .footer-links { text-align: center; margin-top: 20px; }
    .footer-links a {
      color: #5A8C6E;
      font-size: 12px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 1px solid #C5E0D0;
      padding: 7px 18px;
      border-radius: 20px;
      background: #fff;
      transition: all .2s;
    }
    .footer-links a:hover { background: var(--mg-pale, #EDF7F2); color: var(--mg); }
    .footer-copy {
      text-align: center;
      margin-top: 14px;
      font-size: 11px;
      color: #9DB8A8;
    }
    .footer-copy span { color: #4A7A5E; font-weight: 600; }

    /* 구분선 */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #C5D8CC;
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #EAF3EE;
    }
  </style>
</head>
<body>
<div class="login-wrap">

  <!-- 브랜드 헤더 -->
  <div class="brand-header">
    <img src="/static/images/bi_logo2.png" class="mg-logo" alt="MG새마을금고"/>
    <h1>IT자산 매각 플랫폼</h1>
    <p>새마을금고 노후 IT자산 관리 시스템</p>
  </div>

  <!-- 로그인 카드 -->
  <div class="login-card">
    {% if error %}
    <div class="alert d-flex align-items-center gap-2 py-2 px-3 mb-4"
         style="font-size:13px;border-radius:8px;background:#FFF5F5;border:1px solid #FFCDD2;color:#C62828">
      <i class="bi bi-exclamation-circle-fill"></i> {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login">
      <div class="mb-3">
        <label class="form-label">지점코드 / 관리자 ID</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person-badge-fill"></i></span>
          <input type="text" name="branch_code" class="form-control"
                 placeholder="예) MG001, WELFARE01, OPERATOR01" required autofocus/>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">비밀번호</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="password" class="form-control"
                 placeholder="비밀번호를 입력하세요" required/>
        </div>
      </div>
      <button type="submit" class="btn btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>로그인
      </button>
    </form>

    <div class="divider">접속 가능 계정</div>
  </div>

  <!-- 하단 링크 -->
  <div class="footer-links">
    <a href="/process">
      <i class="bi bi-play-circle"></i> 플랫폼 업무 프로세스 소개
    </a>
  </div>
  <div class="footer-copy">
    Powered by <span>새마을금고 IT자산 매각 플랫폼</span>
  </div>
</div>
</body>
</html>
