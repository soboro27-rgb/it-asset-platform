services:
  - type: web
    name: it-asset-platform
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python init_data.py && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: itasset-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: itasset-db
    databaseName: itasset
    user: itasset_user
    plan: free
